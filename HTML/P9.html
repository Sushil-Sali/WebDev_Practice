<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="/server">
        <H1>Register Form</H1>
      <label for="fname">First_Name</label>
      <input type="text" name="Fname" id="fname" placeholder="First_name" />
      <label for="Lname">Last_Name</label>
      <input type="text" name="Lname" id="Lname" placeholder="Last_name" /><br>
      <label for="rbtn">Please Select your Gender</label>
      <select name="Gender" id="rbtn">
        <option value="Male" selected>Male</option>
        <option value="Female" >Female</option>
        <option value="Other" >Other</option>
        <P>Do you agree to all terms of service ? <input type="checkbox">Yes I agree</P>
        <button type="submit">Register</button>
      </select> 
    </form>
  </body>
</html>
